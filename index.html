<!DOCTYPE html>
<html>

<head>
    <title>Happy Birthday!</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            background: #0f2027;
            color: #e0f7f1;
            animation: fadeIn 2s ease-in;

            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            color: #00c9a7;
            text-shadow: 0 0 20px rgba(0, 201, 167, 0.7);
            margin-bottom: 10px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(12px);
        }

        iframe {
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: #00c9a7;
            color: black;
            cursor: pointer;
        }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            h1 {
                font-size: 28px;
            }
        }

        /* DESKTOP */
        @media (min-width: 768px) {
            h1 {
                font-size: 56px;
            }
        }
    </style>
</head>

<body>

<h1>Happy Birthday 💚</h1>

<div class="card">
    <p>Even though we're miles apart...</p>

    <iframe 
        src="https://open.spotify.com/embed/playlist/YOUR_PLAYLIST_ID"
        width="100%" 
        height="152"
        style="border-radius:12px; border:none;">
    </iframe>

    <br>

    <a href="YOUR_LINK" target="_blank">
        <button>Open Our Song 💚</button>
    </a>
</div>

</body>
</html>
