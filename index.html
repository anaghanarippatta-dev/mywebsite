<!DOCTYPE html>
<html>

<head>
    <title>Happy Birthday!</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Playfair+Display&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            text-align: center;
            font-family: 'Poppins', sans-serif;
            background: #0f2027;
            color: #e0f7f1;
            animation: fadeIn 2s ease-in;

            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            color: #00c9a7;
            text-shadow: 0 0 20px rgba(0, 201, 167, 0.7);
            margin-bottom: 10px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(12px);
        }

        iframe {
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: #00c9a7;
            color: black;
            cursor: pointer;
        }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            h1 {
                font-size: 28px;
            }
        }

        /* DESKTOP */
        @media (min-width: 768px) {
            h1 {
                font-size: 56px;
            }
        }
        .cd {
    width: 120px;
    margin-top: 20px;
    border-radius: 50%;
    cursor: pointer;

    animation: 
        spin 6s linear infinite,
        pulse 1.5s ease-in-out infinite;
}

/* spinning */
@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* glowing pulse */
@keyframes pulse {
    0% {
        box-shadow: 0 0 10px rgba(0,255,200,0.3);
        transform: scale(1);
    }
    50% {
        box-shadow: 0 0 30px rgba(0,255,200,0.8);
        transform: scale(1.08);
    }
    100% {
        box-shadow: 0 0 10px rgba(0,255,200,0.3);
        transform: scale(1);
    }
}

/* click press */
.cd:active {
    transform: scale(0.95);
}
    </style>
</head>

<body>

<h1>Happy Birthday 💚</h1>

<div class="card">
    <p>Even though we're miles apart...</p>

    <<a href="YOUR_LINK" target="_blank">
    <img src="cd.png" class="cd">
</a>

<p style="opacity:0.7; margin-top:10px;">Tap to play 💚</p>
</div>

</body>
</html>
