<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💚</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Italiana&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 100%);
  color: #c8ffd4;
  font-family: 'Space Mono', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
}

/* Stars */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle var(--dur,3s) infinite;
}
@keyframes twinkle {
  0%,100% { opacity: var(--min-op,0.1); }
  50% { opacity: var(--max-op,0.8); }
}

/* Constellations */
.constellation-line {
  position: absolute;
  height: 1px;
  background: rgba(200,255,212,0.15);
  transform-origin: left center;
}
@media (max-width:500px){
  .constellation-line { opacity:0.08; }
}

/* Title */
h1 {
  font-family: 'Italiana', serif;
  font-size: clamp(2.5rem,8vw,4.5rem);
  color:#00e5a0;
  z-index:1;
}

/* Card */
.card {
  background: rgba(255,255,255,0.03);
  border-radius: 24px;
  padding: 2rem;
  backdrop-filter: blur(20px);
  z-index:1;
  margin-top:20px;
}

/* Stage */
.stage {
  display:flex;
  gap:2rem;
}

/* CD */
.cd-disc {
  width:140px;
  height:140px;
  border-radius:50%;
  overflow:hidden;
}
.cd-disc img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Knob */
.knob-wrap {
  width:100px;
  height:100px;
  border-radius:50%;
  background:#1a1a2e;
  cursor:grab;
}

/* Audio bars */
.audio-bars {
  display:flex;
  gap:3px;
  margin-bottom:10px;
}
.bar {
  width:3px;
  height:5px;
  background:#00e5a0;
  opacity:0.2;
}
.audio-bars.playing .bar {
  opacity:1;
  animation: bounce 0.5s infinite alternate;
}
@keyframes bounce {
  from { height:4px; }
  to { height:18px; }
}

/* Envelope */
.envelope {
  margin-top:2rem;
  opacity:0;
  transform:translateY(20px);
  transition:0.6s;
  cursor:pointer;
}
.envelope.show { opacity:1; transform:none; }

/* Poem */
.poem {
  margin-top:2rem;
  white-space:pre-wrap;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<audio id="audio" src="your-voice.mp3" loop></audio>

<h1>Happy Birthday</h1>

<div class="card">

<div class="audio-bars" id="audioBars">
<div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>

<div class="stage">
<div class="cd-disc" id="cdDisc">
<img src="cd.png">
</div>

<div class="knob-wrap" id="knob"></div>
</div>

</div>

<div id="envelope" class="envelope hidden">✉️</div>

<div id="poem" class="poem hidden">
<p id="poemText"></p>
</div>

<script>
// ⭐ stars
const starsContainer=document.getElementById('stars');

for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.width=s.style.height=Math.random()*2+1+'px';
  s.style.top=Math.random()*100+'%';
  s.style.left=Math.random()*100+'%';
  starsContainer.appendChild(s);
}

// ✨ constellations
function createConstellations(){
  const stars=document.querySelectorAll('.star');

  stars.forEach((a,i)=>{
    const rectA=a.getBoundingClientRect();
    let connections=0;

    stars.forEach((b,j)=>{
      if(j<=i) return;
      if(connections>=2) return;

      const rectB=b.getBoundingClientRect();

      const dx=rectB.left-rectA.left;
      const dy=rectB.top-rectA.top;
      const dist=Math.sqrt(dx*dx+dy*dy);

      const max=window.innerWidth<500?70:120;

      if(dist<max){
        const line=document.createElement('div');
        line.className='constellation-line';

        line.style.width=dist+'px';
        line.style.left=rectA.left+'px';
        line.style.top=rectA.top+'px';

        const angle=Math.atan2(dy,dx)*(180/Math.PI);
        line.style.transform=`rotate(${angle}deg)`;

        starsContainer.appendChild(line);
        connections++;
      }
    });
  });
}
setTimeout(createConstellations,100);

// 🎛️ knob
const knob=document.getElementById('knob');
const cd=document.getElementById('cdDisc');
const audio=document.getElementById('audio');
const bars=document.getElementById('audioBars');
const envelope=document.getElementById('envelope');

let dragging=false;
let angle=0;

knob.onmousedown=()=>dragging=true;
window.onmouseup=()=>dragging=false;

window.onmousemove=(e)=>{
if(!dragging) return;

angle+=2;
knob.style.transform=`rotate(${angle}deg)`;
cd.style.transform=`rotate(${angle*1.5}deg)`;

audio.play();
bars.classList.add('playing');

envelope.classList.remove("hidden");
envelope.classList.add("show");

document.querySelectorAll('.constellation-line').forEach(l=>{
  l.style.background='rgba(200,255,212,0.35)';
});
};

// ✉️ poem
const poem=`i didn’t expect this...

but i’m really glad it’s you.`;

let i=0;

function type(){
if(i<poem.length){
  document.getElementById('poemText').innerHTML+=poem[i++];
  setTimeout(type,40);
}
}

envelope.onclick=()=>{
  envelope.style.display="none";
  document.getElementById('poem').classList.remove("hidden");
  type();
};
</script>

</body>
</html>
